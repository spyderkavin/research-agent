name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r research_agent/requirements.txt

      - name: Set dummy API key
        run: echo "GEMINI_API_KEY=dummy-key-for-testing" >> $GITHUB_ENV

      - name: Run tests with coverage
        run: |
          cd research_agent
          pytest test.py -v --cov=. --cov-report=term-missing

      - name: Fail if coverage below 70%
        run: |
          cd research_agent
          pytest test.py --cov=. --cov-fail-under=70